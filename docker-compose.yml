services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    user: "1000:1000"
    environment:
      - node.name=elasticsearch
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      # Security Configuration
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      # Built-in users passwords
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.authc.realms.native.native1.order=0
      # License monitoring
      - xpack.monitoring.collection.enabled=true
      - xpack.license.self_generated.type=basic
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./logs/elasticsearch:/usr/share/elasticsearch/logs
    ports: ["9200:9200","9300:9300"]
    healthcheck:
      test: ["CMD-SHELL","curl -u elastic:${ELASTIC_PASSWORD} -s http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks: [elk]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports: ["5601:5601"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - xpack.security.enabled=true
      - xpack.monitoring.ui.container.elasticsearch.enabled=true
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - ./logs/kibana:/usr/share/kibana/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

  redis:
    image: redis:7-alpine
    container_name: redis
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [elk]

  logstash-fast:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash-fast
    environment:
      - "LS_JAVA_OPTS=-Xmx2g -Xms2g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logstash/config:/usr/share/logstash/config-host
      - ./logstash/pipeline-fast:/usr/share/logstash/pipeline-fast
      - ./logstash/patterns:/usr/share/logstash/patterns
      - ./logstash/geoip:/usr/share/logstash/geoip
      - ./logstash/drivers:/usr/share/logstash/drivers
    command: >
      bash -c "
        cp -f /usr/share/logstash/config-host/logstash-fast.yml /usr/share/logstash/config/logstash.yml &&
        cp -f /usr/share/logstash/config-host/pipelines-fast.yml /usr/share/logstash/config/pipelines.yml &&
        /usr/local/bin/docker-entrypoint
      "
    ports: ["5044:5044","9600:9600"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats/pipelines || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [elk]

  logstash-enrich:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash-enrich
    environment:
      - "LS_JAVA_OPTS=-Xmx3g -Xms3g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logstash/config:/usr/share/logstash/config-host
      - ./logstash/pipeline-enrich:/usr/share/logstash/pipeline-enrich
      - ./logstash/patterns:/usr/share/logstash/patterns
      - ./logstash/geoip:/usr/share/logstash/geoip
      - ./logstash/drivers:/usr/share/logstash/drivers
    command: >
      bash -c "
        cp -f /usr/share/logstash/config-host/logstash-enrich.yml /usr/share/logstash/config/logstash.yml &&
        cp -f /usr/share/logstash/config-host/pipelines-enrich.yml /usr/share/logstash/config/pipelines.yml &&
        /usr/local/bin/docker-entrypoint
      "
    ports: ["5045:5045","9601:9600"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats/pipelines || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash-fast:
        condition: service_started
    networks: [elk]

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.11.0
    container_name: metricbeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
      - ./metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - ./logs/metricbeat:/var/log/metricbeat
    healthcheck:
      test: ["CMD-SHELL", "metricbeat test config || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    user: root
    command: ["--strict.perms=false"]
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs/filebeat:/var/log/filebeat
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "filebeat test output || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]


volumes:
  elasticsearch-data: { driver: local }

networks:
  elk: { driver: bridge }
