# Pipeline 2: Enrichment - Heavy Processing with Authentication
input {
  redis {
    host => "redis"
    port => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key => "cloudfront_queue"
    codec => json
  }
}

filter {
  # Skip already enriched
  if [processing_stage] == "enriched" { drop { } }

  # 1) Clean IP
  if [c_ip] {
    mutate { gsub => [ "c_ip", "/32$", "" ] }
  }

  # 2) GeoIP City + ASN (skip private)
  if [c_ip] and [c_ip] != "-" and [c_ip] !~ /^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
    geoip {
      source => "c_ip"
      target => "source"
      database => "/usr/share/logstash/geoip/GeoLite2-City.mmdb"
      tag_on_failure => ["_geoip_city_lookup_failure"]
    }
    geoip {
      source => "c_ip"
      target => "source"
      database => "/usr/share/logstash/geoip/GeoLite2-ASN.mmdb"
      tag_on_failure => ["_geoip_asn_lookup_failure"]
    }
  } else {
    mutate { add_field => { "geoip_skip_reason" => "private_or_invalid_ip" } }
  }

  # 3) User Agent parsing (fixed: use cs_user_agent)
  ruby {
    code => "
      ua_string = event.get('cs_user_agent')
      if ua_string && ua_string.to_s != '-' && ua_string.to_s.strip.length > 0
        browser_name = 'Unknown'
        browser_version = 'Unknown'
        case ua_string
        when /Chrome\/([0-9.]+).*CriOS\//
          browser_name = ':apple: Chrome iOS'; browser_version = $1
        when /Chrome\/([0-9.]+).*(Mobile|Android)/
          browser_name = ':iphone: Chrome Mobile'; browser_version = $1
        when /Chrome\/([0-9.]+)/
          browser_name = ':desktop_computer: Chrome Desktop'; browser_version = $1
        when /Version\/([0-9.]+).*Safari\/(?!.*Chrome)/
          browser_name = ua_string.include?('Mobile/') || ua_string.include?('iPhone') ? ':apple: Safari Mobile' : ':desktop_computer: Safari Desktop'
          browser_version = $1
        when /Firefox\/([0-9.]+)/
          browser_name = ':fox_face: Firefox'; browser_version = $1
        when /Edge\/([0-9.]+)/
          browser_name = ':large_blue_diamond: Edge'; browser_version = $1
        when /bot|crawler/i
          browser_name = ':robot_face: Bot'
          browser_name = ':speech_balloon: Slackbot' if ua_string.include?('Slackbot')
          browser_name = ':mag: Googlebot' if ua_string.include?('Googlebot')
        end

        os_name =
          if ua_string.include?('iPhone') then ':iphone: iOS'
          elsif ua_string.include?('iPad') then ':iphone: iPad'
          elsif ua_string.include?('Android') then ':robot_face: Android'
          elsif ua_string.include?('Windows NT') then ':window: Windows'
          elsif ua_string =~ /Macintosh|Mac OS X/ then ':apple: macOS'
          elsif ua_string.include?('Linux') then ':penguin: Linux'
          else 'Unknown' end

        device_type =
          if ua_string =~ /Mobile|iPhone|Android/ then ':iphone: Mobile'
          elsif ua_string =~ /Tablet|iPad/ then ':iphone: Tablet'
          elsif ua_string =~ /bot/i then ':robot_face: Bot'
          else ':desktop_computer: Desktop' end

        event.set('browser_name', browser_name)
        event.set('browser_version', browser_version)
        event.set('os_name', os_name)
        event.set('device_type', device_type)
      else
        event.set('browser_name', 'Unknown')
        event.set('browser_version', 'Unknown')
        event.set('os_name', 'Unknown')
        event.set('device_type', ':desktop_computer: Desktop')
      end
    "
  }

  # 4) GeoIP post-processing
  ruby {
    code => "
      geo_defaults = {'country_name'=>'Unknown','country_code'=>'XX','city_name'=>'Unknown','region_name'=>'Unknown',
                      'latitude'=>0.0,'longitude'=>0.0,'isp_name'=>'Unknown','asn_number'=>'Unknown','asn_organization'=>'Unknown'}
      source_data = event.get('source')
      tags = event.get('tags') || []
      geoip_skip_reason = event.get('geoip_skip_reason') || ''

      if tags.include?('_geoip_city_lookup_failure') || geoip_skip_reason == 'private_or_invalid_ip'
        geo_defaults.each{|k,v| event.set(k,v)}
      else
        if source_data && source_data['geo']
          g = source_data['geo']
          event.set('country_name', g['country_name'] || geo_defaults['country_name'])
          event.set('country_code', g['country_iso_code'] || geo_defaults['country_code'])
          event.set('city_name', g['city_name'] || geo_defaults['city_name'])
          event.set('region_name', g['region_name'] || geo_defaults['region_name'])
          if g['location']
            event.set('latitude',  g['location']['lat'] || geo_defaults['latitude'])
            event.set('longitude', g['location']['lon'] || geo_defaults['longitude'])
          else
            event.set('latitude',  geo_defaults['latitude'])
            event.set('longitude', geo_defaults['longitude'])
          end
        else
          %w[country_name country_code city_name region_name latitude longitude].each{|f| event.set(f, geo_defaults[f])}
        end

        if source_data && source_data['as']
          asd = source_data['as']
          event.set('asn_number', asd['number'] || geo_defaults['asn_number'])
          if asd['organization'] && asd['organization']['name']
            org = asd['organization']['name']
            clean = org.gsub(/^AS\d+\s+/,'').gsub(/\s+(Inc\.?|LLC|Ltd\.?)$/i,'').strip
            event.set('isp_name', clean)
            event.set('asn_organization', org)
          else
            event.set('isp_name', geo_defaults['isp_name'])
            event.set('asn_organization', geo_defaults['asn_organization'])
          end
        else
          event.set('asn_number', geo_defaults['asn_number'])
          event.set('isp_name', geo_defaults['isp_name'])
          event.set('asn_organization', geo_defaults['asn_organization'])
        end
      end

      # Clean empty fields
      %w[cs_referer cs_user_agent cs_uri_query cs_cookie x_forwarded_for].each do |f|
        v = event.get(f); event.remove(f) if v && (v.to_s.strip.empty? || v.to_s == '-')
      end

      # Remove temps
      event.remove('source') if event.get('source')
      event.remove('geoip_skip_reason') if event.get('geoip_skip_reason')

      # Clean tags
      t = event.get('tags')
      if t.is_a?(Array)
        t.delete_if{|tag| tag.start_with?('_geoip_')}
        t.empty? ? event.remove('tags') : event.set('tags', t)
      end
    "
  }

  # 5) CloudFront helpers
  ruby {
    code => "
      if (e = event.get('x_edge_location')) && e.to_s != '-'
        if (m = e.to_s.match(/^([A-Z]{3})/)); event.set('edge_region', m[1]); end
      end

      if (rt = event.get('x_edge_result_type'))
        event.set('cache_status',
          case rt.to_s
          when 'Hit' then ':white_check_mark: Cache Hit'
          when 'Miss' then ':x: Cache Miss'
          when 'RefreshHit' then ':arrows_counterclockwise: Refresh Hit'
          when 'Error' then ':warning: Error'
          else rt.to_s end)
      end

      sc = event.get('sc_status')
      if sc.is_a?(Integer)
        event.set('status_category',
          case sc
          when 200..299 then ':white_check_mark: Success'
          when 300..399 then ':arrows_counterclockwise: Redirect'
          when 400..499 then ':x: Client Error'
          when 500..599 then ':warning: Server Error'
          else 'Unknown' end)
      end

      ct = event.get('sc_content_type')
      if ct && ct.to_s != '-'
        event.set('content_category',
          case ct.to_s
          when /^text\/html/ then ':page_facing_up: HTML'
          when /^text\/css/ then ':art: CSS'
          when /^application\/javascript|text\/javascript/ then ':zap: JavaScript'
          when /^image\// then ':frame_with_picture: Image'
          when /^video\// then ':movie_camera: Video'
          when /^audio\// then ':musical_note: Audio'
          when /^application\/json/ then ':bar_chart: JSON'
          when /^application\/xml|text\/xml/ then ':clipboard: XML'
          else ':file_folder: Other' end)
      else
        event.set('content_category', 'Unknown')
      end

      event.set('processing_stage', 'enriched')
      event.set('needs_enrichment', 'false')
      event.set('enriched_timestamp', Time.now.utc.iso8601)
    "
  }

  # 6) Final enriched index name
  ruby {
    code => "
      v = event.get('date_field')
      event.set('final_index_name', 'cloudfront-logs-enriched-' + (v && !v.to_s.empty? ? v.to_s.gsub('-', '.') : Time.now.strftime('%Y.%m.%d')))
    "
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{final_index_name}"
    document_id => "%{id}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    manage_template => false
  }
}
