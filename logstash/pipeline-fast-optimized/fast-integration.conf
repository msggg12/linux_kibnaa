# OPTIMIZED Pipeline 1: Fast Ingestion - High Performance Processing
input {
  jdbc {
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST:192.168.23.70}:${DB_PORT:5432}/${DB_NAME:aviatordb}"
    jdbc_user => "${DB_USER:metrics_user}"
    jdbc_password => "${DB_PASSWORD:Metrics_!$}"
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_driver_library => "/usr/share/logstash/drivers/postgresql-42.7.3.jar"

    # OPTIMIZED: Increased batch size and better scheduling
    statement => "
      SELECT
        id,
        TO_CHAR(date_field, 'YYYY-MM-DD') AS date_field,
        TO_CHAR(time_field, 'HH24:MI:SS') AS time_field,
        x_edge_location,
        sc_bytes,
        c_ip::TEXT AS c_ip,
        sc_status,
        cs_referer,
        cs_user_agent,
        cs_uri_query,
        cs_cookie,
        x_edge_result_type,
        x_edge_request_id,
        cs_protocol,
        cs_bytes,
        time_taken,
        x_forwarded_for::TEXT AS x_forwarded_for,
        cs_protocol_version,
        fle_status,
        c_port,
        time_to_first_byte,
        x_edge_detailed_result_type,
        sc_content_type,
        sc_content_len,
        sc_range_start,
        sc_range_end,
        processed_at
      FROM public.s3_cloudfront_logs
      WHERE id::numeric > :sql_last_value
      ORDER BY id ASC
      LIMIT 10000
    "
    use_column_value => true
    tracking_column => "id"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/usr/share/logstash/data/.logstash_jdbc_last_run_fast"
    # OPTIMIZED: More frequent execution for high volume
    schedule => "*/30 * * * * *"  # Every 30 seconds
    jdbc_validate_connection => true
    jdbc_validation_timeout => "3600"
    connection_retry_attempts => 3
    connection_retry_attempts_wait_time => 5
    jdbc_pool_timeout => 300
    jdbc_default_timezone => "UTC"
    
    # Performance optimizations
    jdbc_fetch_size => 10000
    jdbc_page_size => 10000
  }
}

filter {
  # Skip processing if already processed
  if [processing_stage] == "fast_processed" { drop { } }

  # Add processing metadata
  mutate {
    add_field => { 
      "processing_stage" => "fast_processed"
      "pipeline_id" => "fast-integration"
      "ingestion_timestamp" => "%{[@timestamp]}"
    }
  }

  # Basic field validation and cleaning
  if [c_ip] {
    mutate { 
      gsub => [ "c_ip", "/32$", "" ]
      gsub => [ "c_ip", "^\s+|\s+$", "" ]
    }
  }

  # Convert numeric fields with error handling
  if [sc_bytes] and [sc_bytes] != "-" {
    mutate { 
      convert => { "sc_bytes" => "integer" } 
      add_tag => [ "numeric_conversion" ]
    }
  }

  if [cs_bytes] and [cs_bytes] != "-" {
    mutate { convert => { "cs_bytes" => "integer" } }
  }

  if [time_taken] and [time_taken] != "-" {
    mutate { convert => { "time_taken" => "float" } }
  }

  if [sc_status] and [sc_status] != "-" {
    mutate { convert => { "sc_status" => "integer" } }
  }

  # Timestamp creation - optimized
  if [date_field] and [time_field] {
    mutate {
      add_field => { "combined_datetime" => "%{date_field} %{time_field}" }
    }
    
    date {
      match => [ "combined_datetime", "yyyy-MM-dd HH:mm:ss" ]
      target => "log_timestamp"
      timezone => "UTC"
    }
    
    mutate { remove_field => ["combined_datetime"] }
  }

  # Add document ID for deduplication
  if [id] {
    mutate {
      add_field => { "[@metadata][document_id]" => "%{id}" }
    }
  }

  # Error handling
  if "_grokparsefailure" in [tags] or "_dateparsefailure" in [tags] {
    mutate {
      add_tag => [ "parse_error", "needs_review" ]
      add_field => { "error_pipeline" => "fast-integration" }
    }
  }
}

output {
  # Send to Redis for further processing
  redis {
    host => "redis"
    port => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key => "cloudfront_queue"
    codec => json
    # Performance settings
    timeout => 5
    reconnect_interval => 1
  }

  # Also send directly to Elasticsearch for faster access
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    
    # Index management
    index => "cloudfront-logs-%{+YYYY.MM.dd}"
    document_id => "%{[@metadata][document_id]}"
    
    # Performance optimizations
    template_name => "cloudfront-logs"
    template_pattern => "cloudfront-logs-*"
    template => {
      "index_patterns" => ["cloudfront-logs-*"]
      "settings" => {
        "number_of_shards" => 1
        "number_of_replicas" => 0
        "refresh_interval" => "30s"
        "index.codec" => "best_compression"
        "index.mapping.total_fields.limit" => 2000
      }
      "mappings" => {
        "properties" => {
          "log_timestamp" => { "type" => "date" }
          "c_ip" => { "type" => "ip" }
          "sc_bytes" => { "type" => "long" }
          "cs_bytes" => { "type" => "long" }
          "time_taken" => { "type" => "float" }
          "sc_status" => { "type" => "short" }
          "cs_user_agent" => { "type" => "text", "index" => false }
          "cs_referer" => { "type" => "text", "index" => false }
        }
      }
    }
  }

  # Error handling output
  if "parse_error" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "logstash-errors-%{+YYYY.MM.dd}"
    }
  }
}