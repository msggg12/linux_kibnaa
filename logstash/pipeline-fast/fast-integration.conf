# Pipeline 1: Fast Ingestion - Minimal Processing with Authentication
input {
  jdbc {
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST:192.168.23.70}:${DB_PORT:5432}/${DB_NAME:aviatordb}"
    jdbc_user => "${DB_USER:metrics_user}"
    jdbc_password => "${DB_PASSWORD:Metrics_!$}"
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_driver_library => "/usr/share/logstash/drivers/postgresql-42.7.3.jar"

    statement => "
      SELECT
        id,
        TO_CHAR(date_field, 'YYYY-MM-DD') AS date_field,
        TO_CHAR(time_field, 'HH24:MI:SS') AS time_field,
        x_edge_location,
        sc_bytes,
        c_ip::TEXT AS c_ip,
        sc_status,
        cs_referer,
        cs_user_agent,
        cs_uri_query,
        cs_cookie,
        x_edge_result_type,
        x_edge_request_id,
        cs_protocol,
        cs_bytes,
        time_taken,
        x_forwarded_for::TEXT AS x_forwarded_for,
        cs_protocol_version,
        fle_status,
        c_port,
        time_to_first_byte,
        x_edge_detailed_result_type,
        sc_content_type,
        sc_content_len,
        sc_range_start,
        sc_range_end,
        processed_at
      FROM public.s3_cloudfront_logs
      WHERE id::numeric > :sql_last_value
      ORDER BY id ASC
      LIMIT 5000
    "
    use_column_value => true
    tracking_column => "id"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/usr/share/logstash/data/.logstash_jdbc_last_run_fast"
    schedule => "* * * * *"
    jdbc_validate_connection => true
    jdbc_validation_timeout => "3600"
    jdbc_fetch_size => 2000
    jdbc_paging_enabled => true
    ecs_compatibility => disabled
  }
}

filter {
  # 1) Fast index name
  ruby {
    code => "
      v = event.get('date_field')
      event.set('final_index_name', 'cloudfront-logs-raw-' + (v && !v.to_s.empty? ? v.to_s.gsub('-', '.') : Time.now.strftime('%Y.%m.%d')))
    "
  }

  # 2) Timestamp (UTC -> Asia/Tbilisi +4)
  if [date_field] and [time_field] {
    ruby { code => "event.set('temp_datetime', event.get('date_field').to_s + ' ' + event.get('time_field').to_s)" }
    date { match => ["temp_datetime", "yyyy-MM-dd HH:mm:ss"] target => "@timestamp" timezone => "UTC" }
    ruby {
      code => "
        t = event.get('@timestamp')
        event.set('@timestamp', LogStash::Timestamp.new(t.time + 4*3600)) if t
      "
    }
    mutate { remove_field => ["temp_datetime"] }
  }

  # 3) Numeric conversions
  mutate {
    convert => {
      "sc_bytes" => "integer"  "cs_bytes" => "integer"  "sc_status" => "integer"
      "sc_content_len" => "integer"  "c_port" => "integer"
      "time_taken" => "float"  "time_to_first_byte" => "float"
    }
  }

  # 4) Mark raw + enrichment flag
  mutate {
    add_field => { "processing_stage" => "raw"  "log_type" => "cloudfront"  "needs_enrichment" => "true" }
  }
}

output {
  # Elasticsearch (raw) with authentication
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{final_index_name}"
    document_id => "%{id}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    manage_template => false
  }

  # Queue to Redis for enrichment with authentication
  redis {
    host => "redis"
    port => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key => "cloudfront_queue"
    codec => json
  }
}
