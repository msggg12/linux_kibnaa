# Fast Pipeline - Optimized for High Throughput
pipeline.ordered: auto
dead_letter_queue.enable: true
dead_letter_queue.max_bytes: 1gb

# API Configuration
api.enabled: true
api.http.host: "0.0.0.0"
api.http.port: 9600

# Logging
log.level: info
log.format: json

# OPTIMIZED PERFORMANCE SETTINGS for 1M+ docs/day
pipeline.workers: 8  # Increased from 2 to 8 for 8-core CPU
pipeline.batch.size: 2000  # Increased from 200 to 2000
pipeline.batch.delay: 50  # Optimized timing

# Queue Configuration - Persistent Queue for Reliability
queue.type: persisted
queue.max_events: 100000
queue.max_bytes: 2gb
queue.checkpoint.acks: 1024
queue.checkpoint.writes: 1024
queue.checkpoint.interval: 1000

# Monitoring
xpack.monitoring.enabled: true
xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]
xpack.monitoring.elasticsearch.username: "logstash_system"
xpack.monitoring.elasticsearch.password: "${ELASTIC_PASSWORD}"

# JVM Options for Performance
config.reload.automatic: false
config.reload.interval: 3s

# Pipeline Stats
pipeline.plugin_classloaders: false