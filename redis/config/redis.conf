# Security
requirepass ${REDIS_PASSWORD}
protected-mode yes

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511

# Memory Management
maxmemory 1gb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0
