# Redis Optimized Configuration for ELK Stack
bind 0.0.0.0
port 6379
protected-mode yes
requirepass "${REDIS_PASSWORD}"

# Memory Management - Optimized for 4GB allocation
maxmemory 3gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence Configuration - Balanced for performance and safety
save 900 1     # Save if at least 1 key changed in 900 seconds
save 300 10    # Save if at least 10 keys changed in 300 seconds  
save 60 10000  # Save if at least 10000 keys changed in 60 seconds

# RDB Configuration
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Configuration - Disabled for performance in log buffering
appendonly no

# Network and Connection Settings
tcp-keepalive 300
tcp-backlog 511
timeout 0

# Performance Optimizations
databases 16
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Slow Log Configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Advanced Configuration
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Memory Usage Optimization
activerehashing yes
client-query-buffer-limit 1gb
proto-max-bulk-len 512mb

# Logging
loglevel notice
logfile /data/redis.log

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""