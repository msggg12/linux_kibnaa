route:
  receiver: grafana-webhook
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: grafana-webhook
    webhook_configs:
      - url: http://grafana:3000/api/annotations
        http_config:
          basic_auth:
            username: admin
            password: admin
        send_resolved: true