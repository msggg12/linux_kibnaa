filebeat.inputs:
  - type: filestream
    id: docker-containers
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    parsers:
      - ndjson:
          target: ""
    prospector.scanner.symlinks: true
    json.add_error_key: true
    json.expand_keys: true
    fields:
      source_type: docker
    fields_under_root: true

  - type: filestream
    id: system-logs
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
      - /var/log/kern.log
      - /var/log/messages
    fields:
      source_type: system
    fields_under_root: true

filebeat.modules:
  - module: system
    syslog:
      enabled: true
    auth:
      enabled: true

processors:
  - add_host_metadata: ~
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - decode_json_fields:
      fields: ["message"]
      process_array: true
      max_depth: 8
      target: ""
      overwrite_keys: true

queue.mem:
  events: 8192
  flush.min_events: 2048

setup.template.enabled: false
setup.ilm.enabled: false

setup.kibana:
  host: kibana:5601
  username: elastic
  password: ${ELASTIC_PASSWORD}

setup.dashboards.enabled: true

output.logstash:
  hosts: ["logstash:5044"]
  loadbalance: true
  worker: 2
  compression_level: 3
  pipelining: 2