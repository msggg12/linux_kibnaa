apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Elasticsearch-Logs
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    jsonData:
      esVersion: 8
      timeField: "@timestamp"
      interval: "Daily"
      timeInterval: "10s"
      logMessageField: "message"
      dataLinks: []
    basicAuth: true
    basicAuthUser: ${ELASTIC_GRAFANA_USER}
    secureJsonData:
      basicAuthPassword: ${ELASTIC_PASSWORD}