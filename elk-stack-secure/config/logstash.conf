input {
  beats {
    port => 5044
    client_inactivity_timeout => 120
  }
}

filter {
  if [log][file][path] =~ ".*\\/var\\/lib\\/docker\\/containers.*" {
    mutate { add_tag => ["docker"] }
  }

  if [json] {
    json { source => "message" target => "" }
  }

  if !["@timestamp"] and [timestamp] {
    date { match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"] }
  }

  mutate {
    remove_field => ["agent.ephemeral_id", "ecs.version", "host.hostname", "input.type", "log.offset"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "logs-%{[event][dataset]}-%{+YYYY.MM.dd}"
    sniffing => false
    manage_template => false
    ilm_enabled => false
    retry_initial_interval => 10
    retry_max_interval => 60
  }
  stdout { codec => json }
}